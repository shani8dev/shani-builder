name: Promote Latest to Stable

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to promote (all = gnome + plasma)'
        required: true
        type: choice
        options:
          - all
          - gnome
          - plasma
          - cosmic

# One promotion at a time — prevents two dispatches racing to write stable.txt
concurrency:
  group: promote-stable
  cancel-in-progress: false

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      matrix:
        profile: ${{ fromJson(github.event.inputs.profile != 'all' && format('["{0}"]', github.event.inputs.profile) || '["gnome", "plasma"]') }}
      fail-fast: false

    env:
      SSH_PRIVATE_KEY:      ${{ secrets.SSH_PRIVATE_KEY }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout shani-install-media
        uses: actions/checkout@v4
        with:
          repository: shani8dev/shani-install-media
          path: shani-install-media
          fetch-depth: 0

      - name: Install rclone
        # rclone is not pre-installed on ubuntu-latest; needed for R2 operations.
        # Non-fatal so the step doesn't block the job if only SF upload is required
        # and R2_BUCKET is not set — promote-stable.sh handles missing rclone gracefully.
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p "$HOME/.config/rclone"
          # Heredoc must start at column 0 — leading spaces corrupt ini key names
          # and cause rclone to silently reject the config, producing auth errors.
          cat > "$HOME/.config/rclone/rclone.conf" <<EOF
[r2]
type = s3
provider = Cloudflare
access_key_id = ${R2_ACCESS_KEY_ID}
secret_access_key = ${R2_SECRET_ACCESS_KEY}
endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
acl = private
no_check_bucket = true
EOF

      - name: Configure SSH for SourceForge
        run: |
          mkdir -p "$HOME/.ssh"
          # printf '%s\n' is safer than echo — does not interpret escape sequences
          # or backslashes that may appear in the key material.
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          # || true: ssh-keyscan exits non-zero on transient DNS failures; the
          # known_hosts file is still written with whatever it did resolve, so the
          # step should not be fatal.
          ssh-keyscan -H sourceforge.net >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          chmod 644 "$HOME/.ssh/known_hosts"
          # Single-quoted format string avoids shell expanding \n before printf sees it.
          printf 'Host *\n    StrictHostKeyChecking no\n    BatchMode yes\n' \
            > "$HOME/.ssh/config"
          # SSH ignores config files with permissions looser than 600.
          chmod 600 "$HOME/.ssh/config"

      - name: Make scripts executable
        run: chmod +x shani-install-media/scripts/promote-stable.sh

      - name: Promote latest to stable — ${{ matrix.profile }}
        working-directory: shani-install-media
        # Absolute path so sudo can locate the script after resetting $PWD.
        run: sudo --preserve-env bash "$GITHUB_WORKSPACE/shani-install-media/scripts/promote-stable.sh" -p "${{ matrix.profile }}"
