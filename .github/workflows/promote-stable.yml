name: Promote Latest to Stable

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to promote (all = gnome + plasma)'
        required: true
        type: choice
        options:
          - all
          - gnome
          - plasma
          - cosmic

# One promotion at a time — prevents two dispatches racing to write stable.txt
concurrency:
  group: promote-stable
  cancel-in-progress: false

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      matrix:
        profile: ${{ fromJson(github.event.inputs.profile != 'all' && format('["{0}"]', github.event.inputs.profile) || '["gnome", "plasma"]') }}
      fail-fast: false

    env:
      SSH_PRIVATE_KEY:      ${{ secrets.SSH_PRIVATE_KEY }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout shani-install-media
        uses: actions/checkout@v4
        with:
          repository: shani8dev/shani-install-media
          path: shani-install-media
          fetch-depth: 0

      - name: Install rclone
        # rclone is not pre-installed on ubuntu-latest; needed for R2 operations.
        # Non-fatal so the step doesn't block the job if only SF upload is required
        # and R2_BUCKET is not set — promote-stable.sh handles missing rclone gracefully.
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Configure SSH for SourceForge
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          printf "Host *\n    StrictHostKeyChecking no\n    BatchMode yes\n" > ~/.ssh/config

      - name: Make scripts executable
        run: chmod +x shani-install-media/scripts/promote-stable.sh

      - name: Promote latest to stable — ${{ matrix.profile }}
        working-directory: shani-install-media
        run: sudo --preserve-env ./scripts/promote-stable.sh -p "${{ matrix.profile }}"
