name: Build and Package

on:
  push:
    branches:
      - main
    paths:
      - 'pkg/pkg-builder.sh'
      - '.github/workflows/build.yaml'
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

# Cancel an in-progress run of this workflow if a newer one starts,
# preventing two builds from writing to shani-repo simultaneously.
concurrency:
  group: pkg-build
  cancel-in-progress: false  # let the running build finish; queue the new one

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    # Pass secrets as environment variables — never as positional shell arguments,
    # which would expose them in ps aux output and the runner process list.
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull builder image
        # Pre-pull the build container so the cold-pull latency does not sit
        # silently inside pkg-builder.sh where it is hard to time or retry.
        # Non-fatal: if Docker Hub is temporarily unavailable the script will
        # attempt its own pull and cached layer reuse still applies either way.
        run: docker pull shrinivasvkumbhar/shani-builder:latest || true

      - name: Run build script
        # Use an absolute path via $GITHUB_WORKSPACE so sudo can locate the
        # script regardless of how it resets $PWD, and invoke it with bash
        # explicitly to avoid any execute-bit or shebang-resolution issues.
        run: sudo --preserve-env bash "$GITHUB_WORKSPACE/pkg/pkg-builder.sh"
