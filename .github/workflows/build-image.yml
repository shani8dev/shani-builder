name: Build Image and Upload

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to build (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - gnome
          - plasma
          - cosmic
        default: ''
      build_mode:
        description: 'Build mode: all (image + release + upload) or full (all + iso + repack + upload all)'
        required: false
        type: choice
        options:
          - all
          - full
        default: all
  schedule:
    # Every Friday 20:30 UTC → Saturday 2:00 AM IST
    - cron: '30 20 * * 5'

# Only one build pipeline runs at a time. A second trigger while a build is
# in-flight is queued rather than cancelled — we don't want to drop a scheduled
# build just because a manual dispatch arrived at the same time.
concurrency:
  group: image-build
  cancel-in-progress: false

jobs:
  build-release-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # full pipeline (image + ISO) can take up to 5–6 hours
    strategy:
      matrix:
        profile: ${{ fromJson(github.event.inputs.profile != '' && format('["{0}"]', github.event.inputs.profile) || '["gnome", "plasma"]') }}
      fail-fast: false

    permissions:
      contents: read

    env:
      SSH_PRIVATE_KEY:      ${{ secrets.SSH_PRIVATE_KEY }}
      GPG_PRIVATE_KEY:      ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE:       ${{ secrets.GPG_PASSPHRASE }}
      GPG_KEY_ID:           ${{ secrets.GPG_KEY_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/lib/jvm \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Checkout shani-install-media
        uses: actions/checkout@v4
        with:
          repository: shani8dev/shani-install-media
          path: shani-install-media
          clean: true
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x shani-install-media/run_in_container.sh shani-install-media/build.sh

      - name: Setup MOK keys
        run: |
          mkdir -p shani-install-media/keys/mok
          echo "${{ secrets.MOK_KEY }}"                        > shani-install-media/keys/mok/MOK.key
          echo "${{ secrets.MOK_CRT }}"                        > shani-install-media/keys/mok/MOK.crt
          echo "${{ secrets.MOK_DER_B64 }}" | base64 --decode  > shani-install-media/keys/mok/MOK.der

      - name: Setup GPG public key
        run: |
          mkdir -p shani-install-media/keys/gpg
          # Use an isolated GNUPGHOME so the import doesn't touch the runner's
          # system keyring and is automatically discarded after the job exits.
          TMPGNUPG="$(mktemp -d)"
          chmod 700 "$TMPGNUPG"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" \
            | gpg --homedir "$TMPGNUPG" --batch --import
          gpg --homedir "$TMPGNUPG" \
              --batch \
              --armor \
              --export "${{ secrets.GPG_KEY_ID }}" \
              > shani-install-media/keys/gpg/gpg-public.asc
          rm -rf "$TMPGNUPG"

      # ── all mode (default / scheduled) ────────────────────────────────────
      # Runs: image → release latest → upload image
      - name: Build and upload — ${{ matrix.profile }}
        if: ${{ github.event_name == 'schedule' || github.event.inputs.build_mode != 'full' }}
        working-directory: shani-install-media
        run: sudo --preserve-env ./run_in_container.sh ./build.sh all -p "${{ matrix.profile }}"

      # ── full mode (manual dispatch only) ──────────────────────────────────
      # Runs: image → iso → repack → release latest → upload all
      - name: Full pipeline — ${{ matrix.profile }}
        if: ${{ github.event_name != 'schedule' && github.event.inputs.build_mode == 'full' }}
        working-directory: shani-install-media
        run: sudo --preserve-env ./run_in_container.sh ./build.sh full -p "${{ matrix.profile }}"

      # ── verify ────────────────────────────────────────────────────────────
      - name: Verify uploaded artifact — ${{ matrix.profile }}
        working-directory: shani-install-media
        run: sudo --preserve-env ./run_in_container.sh ./build.sh verify -p "${{ matrix.profile }}"
