name: Promote Latest to Stable

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to promote (all = gnome + plasma)'
        required: true
        type: choice
        options:
          - all
          - gnome
          - plasma
          - cosmic

concurrency:
  group: promote-stable
  cancel-in-progress: false

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      matrix:
        profile: ${{ fromJson(github.event.inputs.profile != 'all' && format('["{0}"]', github.event.inputs.profile) || '["gnome", "plasma"]') }}
      fail-fast: false

    env:
      SSH_PRIVATE_KEY:      ${{ secrets.SSH_PRIVATE_KEY }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout shani-install-media
        uses: actions/checkout@v4
        with:
          repository: shani8dev/shani-install-media
          path: shani-install-media
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x shani-install-media/run_in_container.sh shani-install-media/build.sh

      # run_in_container.sh handles docker pull, SSH setup, and rclone config
      # inside the shani-builder container — no need to install rclone on the
      # runner or manage SSH keys for both user and root separately.
      - name: Promote latest to stable — ${{ matrix.profile }}
        working-directory: shani-install-media
        run: sudo --preserve-env bash run_in_container.sh build.sh promote-stable -p "${{ matrix.profile }}"
